# Jekyll Configuration for GitHub Pages
# Portfolio Website - Mohamed Saif

# Site settings
title: Mohamed Saif — Web Developer
description: A modern and responsive personal portfolio website
url: https://perfcut.github.io/mohamedsaif/Portfolio/
baseurl: /mohamedsaif/Portfolio

# Build settings
markdown: kramdown
theme: jekyll-default

# Output settings
permalink: /:categories/:year/:month/:day/:title:output_ext

# Exclude files
exclude:
  - .gitignore
  - README.md
  - Gemfile
  - Gemfile.lock

# Include files
include:
  - .htaccess

# Collections
collections_dir: .

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
